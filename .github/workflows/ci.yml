name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: pip install -e '.[dev,enterprise]'
      - run: pip install bandit pip-audit
      - run: python scripts/validate_skill.py
      - run: python scripts/audit_skill.py
      - run: python scripts/security_scan.py
      - run: python scripts/export_schemas.py
      - run: python scripts/export_contracts.py
      - run: ruff check .
      - run: mypy src/xhs_skill scripts
      - run: bandit -q -ll -r src/xhs_skill -x tests
      - run: pip-audit
      - run: python evals/run_evals.py
      - run: pytest --cov=xhs_skill --cov-report=term-missing
      - run: python -m build
      - run: python scripts/package_skill.py --output dist/xhs-skill-v5.12.0.zip
      - run: sha256sum dist/xhs-skill-v5.12.0.zip > dist/xhs-skill-v5.12.0.zip.sha256
      - run: python scripts/generate_sbom.py --artifact dist/xhs-skill-v5.12.0.zip --output dist/xhs-skill-v5.12.0.sbom.cdx.json
      - run: python scripts/generate_provenance.py dist/xhs-skill-v5.12.0.zip --output dist/xhs-skill-v5.12.0.provenance.intoto.jsonl
      - run: >-
          python scripts/verify_release.py dist/xhs-skill-v5.12.0.zip
          --sha256-file dist/xhs-skill-v5.12.0.zip.sha256
          --sbom dist/xhs-skill-v5.12.0.sbom.cdx.json
          --provenance dist/xhs-skill-v5.12.0.provenance.intoto.jsonl
      - run: docker build -t xhs-skill:5.12.0 .
      - uses: actions/upload-artifact@v4
        with:
          name: xhs-skill-v5.5-release
          path: dist/

  redis-contract:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
      REDIS_URL: redis://127.0.0.1:6379/15
      APP_SECRET_KEY: ci-secret-key-with-at-least-32-bytes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev,redis]'
      - run: pytest tests/integration/test_redis_concurrency.py -q

  postgres-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xhs
          POSTGRES_PASSWORD: integration-only-password
          POSTGRES_DB: xhs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xhs -d xhs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql://xhs:integration-only-password@127.0.0.1:5432/xhs
      APP_SECRET_KEY: ci-secret-key-with-at-least-32-bytes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev,postgres]'
      - run: pytest tests/integration/test_enterprise_postgres.py tests/integration/test_v51_multinode_failover.py -q
