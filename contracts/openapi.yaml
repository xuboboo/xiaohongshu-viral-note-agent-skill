components:
  schemas:
    AccountAnalytics:
      properties:
        account_id:
          type: string
          title: Account Id
        followers:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Followers
        published_note_count:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Published Note Count
        recent_publish_count_7d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Recent Publish Count 7D
        recent_publish_count_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Recent Publish Count 30D
        average_publish_interval_hours:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Average Publish Interval Hours
        views_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Views 30D
        likes_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Likes 30D
        saves_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Saves 30D
        comments_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Comments 30D
        shares_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Shares 30D
        follows_gained_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Follows Gained 30D
        profile_visits_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Profile Visits 30D
        search_views_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Search Views 30D
        recommendation_views_30d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Recommendation Views 30D
        commercial_note_ratio:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Commercial Note Ratio
        deleted_note_count_90d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Deleted Note Count 90D
        violation_count_90d:
          anyOf:
          - type: integer
            minimum: 0.0
          - type: 'null'
          title: Violation Count 90D
        latest_violation_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Latest Violation At
        category_distribution:
          additionalProperties:
            type: number
          type: object
          title: Category Distribution
        note_performance:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Note Performance
      type: object
      required:
      - account_id
      title: AccountAnalytics
    AccountWeightReport:
      properties:
        score_type:
          type: string
          title: Score Type
          default: ESTIMATED_ACCOUNT_WEIGHT
        overall_score:
          anyOf:
          - type: number
            maximum: 100.0
            minimum: 0.0
          - type: 'null'
          title: Overall Score
        confidence:
          type: string
          title: Confidence
        data_completeness:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Data Completeness
        dimensions:
          additionalProperties:
            $ref: '#/components/schemas/DimensionScore'
          type: object
          title: Dimensions
        strengths:
          items:
            type: string
          type: array
          title: Strengths
        risks:
          items:
            type: string
          type: array
          title: Risks
        recommended_actions:
          items:
            type: string
          type: array
          title: Recommended Actions
        missing_data:
          items:
            type: string
          type: array
          title: Missing Data
        status:
          type: string
          title: Status
          default: OK
        disclaimer:
          type: string
          title: Disclaimer
          default: 该分数为系统根据授权数据计算的账号健康与内容分发能力估算，不是小红书官方内部账号权重。
      type: object
      required:
      - confidence
      - data_completeness
      title: AccountWeightReport
    ApprovalRequest:
      properties:
        ttl_minutes:
          type: integer
          maximum: 120.0
          minimum: 1.0
          title: Ttl Minutes
          default: 30
        ai_disclosure_confirmed:
          type: boolean
          title: Ai Disclosure Confirmed
          default: false
        commercial_disclosure_confirmed:
          type: boolean
          title: Commercial Disclosure Confirmed
          default: false
        account_identity_confirmed:
          type: boolean
          title: Account Identity Confirmed
          default: false
        enterprise_approval_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Enterprise Approval Id
      type: object
      title: ApprovalRequest
