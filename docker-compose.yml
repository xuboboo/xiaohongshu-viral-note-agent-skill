# Local/development reference. Production must use separate RLS API, worker and migration DB roles.
x-runtime: &runtime
  build: .
  env_file: .env
  environment:
    APP_ENV: production
    APP_HOST: 0.0.0.0
    APP_PORT: 8080
    AUTH_REQUIRED: "true"
    APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY to at least 32 random bytes}
    REDIS_URL: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
    REDIS_EVENTS_ENABLED: "true"
    DISTRIBUTED_JOBS_ENABLED: "true"
    DISTRIBUTED_RATE_LIMIT_ENABLED: "true"
    DISTRIBUTED_LOCKS_ENABLED: "true"
    POSTGRES_STATE_ENABLED: "true"
    XHS_DISTRIBUTED_SCHEDULING_ENABLED: "true"
    OUTBOX_WORKER_ENABLED: "true"
    UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    DATABASE_URL: postgresql://xhs:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/xhs
  volumes:
    - ./data:/app/data
    - ./output:/app/output
    - ./playwright/.auth:/app/playwright/.auth
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  restart: unless-stopped
  stop_grace_period: 45s
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=1g

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  app:
    <<: *runtime
    expose:
      - "8080"
    command:
      - sh
      - -c
      - >-
        uvicorn xhs_skill.api.app:create_app --factory --host 0.0.0.0
        --port 8080 --workers ${UVICORN_WORKERS:-1}

  worker:
    <<: *runtime
    command: ["xhs-skill", "worker"]

  scheduler:
    <<: *runtime
    command: ["python", "scripts/run_scheduler.py"]

  outbox:
    <<: *runtime
    command: ["python", "scripts/run_outbox.py"]

  metrics-sync:
    <<: *runtime
    command: ["python", "scripts/run_metrics_sync.py", "--tenant", "*"]

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
      - --tcp-backlog
      - "65535"
    expose:
      - "6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$$REDIS_PASSWORD' ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: xhs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: xhs
      POSTGRES_INITDB_ARGS: "--data-checksums"
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xhs -d xhs"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  redisdata:
